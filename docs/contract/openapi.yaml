openapi: 3.1.0
info:
  title: Wave Match × Wave Chat — Integration Contract
  version: '1.3.0'
  description: |
    **Single source of truth** for the API contract between
    **Wave Match** (platform / CRM) and **Wave Chat** (Telegram AI assistant).

    ## Versioning

    - `1.1.x` was aspirational and did not match deployed `apps/api/routes/wm.js`.
    - `1.2.0` (this version) is **reality-aligned**: each schema mirrors what the
      production Wave Match API at `https://api-production-b682a.up.railway.app`
      actually returns and accepts. Verified by curl against prod.
    - Future contract changes MUST land here as a PR before either side writes
      code. **Code is now the implementation, the spec is the agreement.**

    ## Two services
    - Wave Match REST API (`servers[0]`) — pulled by Wave Chat
    - Wave Chat Webhook receiver (`servers[1]`) — pushed by Wave Match
  contact:
    name: Wave Chat owner
    email: xqrmedia@gmail.com

servers:
  - url: https://api-production-b682a.up.railway.app
    description: Wave Match production API (read+write by Wave Chat)
  - url: https://aiass-production.up.railway.app
    description: Wave Chat webhook receiver (push by Wave Match)

tags:
  - name: users
    description: Wave Match users (CRM-backed)
  - name: notes
    description: CRM notes attached to users
  - name: webhooks-mgmt
    description: Webhook subscription management on Wave Match
  - name: webhooks-receive
    description: Webhook events delivered to Wave Chat

security:
  - bearerAuth: []

paths:
  # =============================================================================
  # Wave Match API — read+write (called BY Wave Chat)
  # =============================================================================

  /api/wm/users/{id}:
    parameters:
      - $ref: '#/components/parameters/UserIdPath'
    get:
      tags: [users]
      summary: Get user by ID (UUID or `tg:<telegramId>`)
      description: |
        The path supports two id forms:
        - **`<uuid>`** — Wave Match internal user UUID
        - **`tg:<telegramId>`** — lookup by Telegram ID (used by Wave Chat on every
          incoming TG message, cached for 10 minutes by default)

        Layers in `include` are additive. Without `include`, only base User fields
        are returned (no `profile`, `clubs`, `stats`).
      parameters:
        - $ref: '#/components/parameters/IncludeQuery'
      responses:
        '200':
          description: User
          headers:
            ETag:
              description: 'Strong ETag, format `"v{version}-{unix_seconds}"`. Echo back as `If-Match`.'
              schema: { type: string, example: '"v3-1714325430"' }
          content:
            application/json:
              schema: { $ref: '#/components/schemas/User' }
        '404': { $ref: '#/components/responses/NotFound' }
        '401': { $ref: '#/components/responses/Unauthorized' }
    patch:
      tags: [users]
      summary: Update writable user fields
      description: |
        ## Writable fields
        Only the keys listed under `WritableUserFields` are accepted. Any other
        key (including `profile.*`, `gender`, `subscription`) returns
        `400 readonly_field` with `{error, fields, allowedFields}`.

        ## Concurrency
        `If-Match` is **optional** server-side but **strongly recommended**.
        - Without `If-Match`: update proceeds without version check.
        - With matching `If-Match`: update applies, fresh ETag returned.
        - With stale `If-Match`: `412 precondition_failed` with `{error, current: User}`.

        ## Profile fields not modeled here
        Profile fields (`city`, `activity`, `businessCard`, `bestClients`,
        `requests`, `currentIncome`, `desiredIncome`, `networkingGoal`) **do not
        exist** in Wave Match. Wave Chat keeps them in its own DB.
      parameters:
        - in: header
          name: If-Match
          required: false
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/WritableUserFields' }
      responses:
        '200':
          description: Updated. Body is the full User object; new ETag in header.
          headers:
            ETag: { schema: { type: string, example: '"v4-1714326100"' } }
          content:
            application/json:
              schema: { $ref: '#/components/schemas/User' }
        '400':
          description: Readonly field or invalid input
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ApiError400' }
        '412':
          description: ETag mismatch (only when `If-Match` was sent and is stale)
          content:
            application/json:
              schema:
                type: object
                required: [error, current]
                properties:
                  error: { type: string, example: precondition_failed }
                  current: { $ref: '#/components/schemas/User' }

  /api/wm/users:
    get:
      tags: [users]
      summary: List users (filterable, cursor-paginated)
      description: Used by Wave Chat for broadcast-audience selection.
      parameters:
        - in: query
          name: limit
          schema: { type: integer, minimum: 1, maximum: 500, default: 100 }
        - in: query
          name: cursor
          description: 'Opaque base64url cursor from previous `nextCursor`'
          schema: { type: string }
        - in: query
          name: updatedSince
          schema: { type: string, format: date-time }
        - in: query
          name: subscriptionTier
          description: 'Comma-separated; values from SubscriptionTier'
          schema: { type: string, example: 'PRO,PREMIUM' }
        - in: query
          name: clubSlug
          schema: { type: string }
        - in: query
          name: marketingOptIn
          schema: { type: boolean }
        - in: query
          name: lastActiveBefore
          schema: { type: string, format: date-time }
        - in: query
          name: lastActiveAfter
          schema: { type: string, format: date-time }
        - in: query
          name: hasEmail
          schema: { type: boolean }
        - in: query
          name: locale
          schema: { type: string }
        - in: query
          name: withTotal
          description: Include `total` in response. Off by default to keep listing fast.
          schema: { type: string, enum: ['1'] }
      responses:
        '200':
          description: Page of users (slim shape)
          content:
            application/json:
              schema:
                type: object
                required: [items]
                properties:
                  items:
                    type: array
                    items: { $ref: '#/components/schemas/UserListItem' }
                  nextCursor:
                    type: string
                    nullable: true
                  total:
                    type: integer
                    nullable: true
                    description: Only present when `withTotal=1` was passed.

  /api/wm/users/{id}/notes:
    parameters:
      - $ref: '#/components/parameters/UserIdPath'
    post:
      tags: [notes]
      summary: Append a CRM note
      description: |
        ## Wave Chat-specific note classification
        Wave Match has 6 note kinds. Wave Chat's domain events
        (`ai_qualification_done`, `ai_match_proposed`, `ai_churn_signal`, ...)
        are stored as `kind: "system"` with the AI label embedded into `body`
        and mirrored in `tags`. Example:
        ```json
        {
          "kind": "system",
          "body": "[ai_qualification_done] User passed qualification: maker, B2B SaaS",
          "tags": ["ai", "qualification"],
          "authorEmail": "wave-chat@aiass.app"
        }
        ```
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/CrmNoteCreate' }
      responses:
        '201':
          description: Created
          content:
            application/json:
              schema: { $ref: '#/components/schemas/CrmNote' }
        '400':
          description: Validation error
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ApiError400' }
    get:
      tags: [notes]
      summary: List CRM notes for a user
      parameters:
        - in: query
          name: limit
          schema: { type: integer, default: 20, maximum: 100 }
        - in: query
          name: kind
          description: Filter by single CrmNoteKind (not csv).
          schema: { $ref: '#/components/schemas/CrmNoteKind' }
      responses:
        '200':
          description: List
          content:
            application/json:
              schema:
                type: array
                items: { $ref: '#/components/schemas/CrmNote' }

  /api/wm/webhooks:
    get:
      tags: [webhooks-mgmt]
      summary: List active webhook subscriptions
      responses:
        '200':
          description: Subscriptions
          content:
            application/json:
              schema:
                type: array
                items: { $ref: '#/components/schemas/WebhookSubscription' }
    post:
      tags: [webhooks-mgmt]
      summary: Create a webhook subscription
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/WebhookSubscriptionCreate' }
      responses:
        '201':
          description: Created
          content:
            application/json:
              schema: { $ref: '#/components/schemas/WebhookSubscription' }

  /api/wm/webhooks/{subscriptionId}:
    parameters:
      - in: path
        name: subscriptionId
        required: true
        schema: { type: string, format: uuid }
    delete:
      tags: [webhooks-mgmt]
      summary: Delete a webhook subscription
      responses:
        '204': { description: Deleted }
        '404': { $ref: '#/components/responses/NotFound' }

  # =============================================================================
  # Wave Chat receiver — pushed BY Wave Match
  # =============================================================================
  /webhooks/wm:
    post:
      tags: [webhooks-receive]
      summary: Receive a Wave Match webhook event
      description: |
        Wave Match POSTs here for each subscribed event. Signed via HMAC-SHA256.

        ### HMAC payload format
        ```
        message   = `${X-WC-Timestamp}.${rawBody}`
        signature = sha256_hex(WAVE_CONNECT_WEBHOOK_SECRET, message)
        header    X-WC-Signature: sha256=<signature>
        ```

        ### Rules
        - `X-WC-Timestamp` is **Unix epoch seconds**.
        - Replay window: 300s (configurable via `WAVE_CONNECT_WEBHOOK_REPLAY_WINDOW`).
        - Idempotency: receiver dedupes by `X-WC-Delivery` header (UUID).
        - Receiver responds with **200 OK** within ≤ 5 sec on success.
        - On any other status, sender retries: 1m → 5m → 30m → 2h → 6h → 24h, then dead.
      security: []
      parameters:
        - in: header
          name: X-WC-Signature
          required: true
          schema: { type: string, example: 'sha256=4f3a...' }
        - in: header
          name: X-WC-Timestamp
          required: true
          schema: { type: integer, description: 'Unix epoch SECONDS' }
        - in: header
          name: X-WC-Delivery
          required: true
          schema: { type: string, format: uuid, description: 'Per-delivery UUID — used for idempotency' }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/WebhookEvent' }
      responses:
        '200':
          description: Accepted
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok: { type: boolean, example: true }
        '401':
          description: Signature invalid / timestamp out of window
          content:
            application/json:
              schema:
                type: object
                properties:
                  error: { type: string, example: invalid signature }
                  reason: { type: string }

# ─── Components ───────────────────────────────────────────────────────────────
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: opaque
      description: Service-account token issued by Wave Match (`wm-issue-key.js`).

  parameters:
    UserIdPath:
      in: path
      name: id
      required: true
      schema: { type: string, example: 'tg:354670132' }
      description: 'Either UUID or `tg:<telegramId>`'
    IncludeQuery:
      in: query
      name: include
      description: 'Comma-separated extra layers: `profile`, `clubs`, `stats`'
      schema:
        type: string
        example: profile,clubs,stats

  responses:
    Unauthorized:
      description: Missing or invalid Bearer token
      content:
        application/json:
          schema:
            type: object
            properties:
              error: { type: string, example: unauthorized }
    NotFound:
      description: Entity not found
      content:
        application/json:
          schema:
            type: object
            properties:
              error: { type: string, example: not_found }

  schemas:
    # ─── Enums ──────────────────────────────────────────────────────────────
    SubscriptionTier:
      type: string
      enum: [FREE, PLUS, PREMIUM, PARTNER]
    AuthProvider:
      type: string
      enum: [telegram, google, email, both]
    NotifPrefs:
      type: string
      enum: [all, weekly, off]
    Gender:
      type: string
      enum: [M, F, Other]
      description: Gender stored on Profile (not on User)
    ClubRole:
      type: string
      enum: [member, admin]
    CrmNoteKind:
      type: string
      enum: [call, email, meeting, note, status, system]

    # ─── Common error ───────────────────────────────────────────────────────
    ApiError400:
      type: object
      required: [error]
      properties:
        error:
          type: string
          example: readonly_field
          description: 'e.g. `readonly_field`, `invalid_kind`, `invalid_body`, `invalid_input`'
        fields:
          type: array
          items: { type: string }
          description: 'Offending fields (when `error=readonly_field`)'
        allowedFields:
          type: array
          items: { type: string }
          description: 'Set of fields the endpoint accepts (when `error=readonly_field`)'

    # ─── Profile (nested under User, optional via include=profile) ──────────
    Profile:
      type: object
      properties:
        role: { type: string, nullable: true }
        industry: { type: string, nullable: true }
        location: { type: string, nullable: true }
        company: { type: string, nullable: true }
        gender: { $ref: '#/components/schemas/Gender' }
        tags:
          type: array
          items: { type: string }
        skills:
          type: array
          items: { type: string }
        hobbies:
          type: array
          items: { type: string }
        completion:
          type: integer
          minimum: 0
          maximum: 100

    Subscription:
      type: object
      properties:
        tier: { $ref: '#/components/schemas/SubscriptionTier' }
        renewsAt: { type: string, format: date-time, nullable: true }

    Balances:
      type: object
      properties:
        usd: { type: number }
        tokens: { type: number }
        matchCredits: { type: integer }

    UserClubMembership:
      type: object
      properties:
        slug: { type: string, example: b2b-pro }
        clubName: { type: string }
        joinedAt: { type: string, format: date-time }
        role: { $ref: '#/components/schemas/ClubRole' }

    UserStats:
      type: object
      properties:
        matchesCount: { type: integer }
        connectionsCount: { type: integer }
        lastMatchAt: { type: string, format: date-time, nullable: true }

    # ─── User (full) ────────────────────────────────────────────────────────
    User:
      type: object
      required: [id, firstName, authProvider, createdAt, updatedAt]
      properties:
        id: { type: string, format: uuid }
        telegramId: { type: string, nullable: true, description: 'BigInt as string' }
        email: { type: string, format: email, nullable: true }
        phone: { type: string, nullable: true }
        firstName: { type: string }
        lastName: { type: string, nullable: true }
        username: { type: string, nullable: true }
        photoUrl: { type: string, format: uri, nullable: true }
        authProvider: { $ref: '#/components/schemas/AuthProvider' }
        locale:
          type: string
          nullable: true
          description: 'Free string (e.g. `ru`, `en-US`). NOT an enum.'
        notifPrefs: { $ref: '#/components/schemas/NotifPrefs' }
        marketingOptIn: { type: boolean }
        marketingOptInUpdatedAt:
          type: string
          format: date-time
          nullable: true
        crmTags:
          type: array
          items: { type: string }
        createdAt: { type: string, format: date-time }
        updatedAt: { type: string, format: date-time }
        lastActiveAt: { type: string, format: date-time }
        subscription: { $ref: '#/components/schemas/Subscription' }
        balances: { $ref: '#/components/schemas/Balances' }
        rating:
          type: number
          minimum: 0
          maximum: 100
        streakCount: { type: integer }
        # Layered (only present if include=...)
        profile: { $ref: '#/components/schemas/Profile' }
        clubs:
          type: array
          items: { $ref: '#/components/schemas/UserClubMembership' }
        stats: { $ref: '#/components/schemas/UserStats' }

    # ─── User listing slim shape ────────────────────────────────────────────
    UserListItem:
      type: object
      required: [id, firstName, updatedAt]
      properties:
        id: { type: string, format: uuid }
        telegramId: { type: string, nullable: true }
        email: { type: string, nullable: true }
        phone: { type: string, nullable: true }
        firstName: { type: string }
        lastName: { type: string, nullable: true }
        locale: { type: string, nullable: true }
        subscriptionTier: { $ref: '#/components/schemas/SubscriptionTier' }
        marketingOptIn: { type: boolean }
        crmTags:
          type: array
          items: { type: string }
        lastActiveAt: { type: string, format: date-time }
        updatedAt: { type: string, format: date-time }

    # ─── PATCH /users/:id body ──────────────────────────────────────────────
    WritableUserFields:
      type: object
      additionalProperties: false
      properties:
        email: { type: string, format: email, nullable: true }
        phone: { type: string, nullable: true }
        firstName: { type: string }
        lastName: { type: string, nullable: true }
        notifPrefs: { $ref: '#/components/schemas/NotifPrefs' }
        marketingOptIn: { type: boolean }
        marketingOptInUpdatedAt: { type: string, format: date-time }
        crmTags:
          type: array
          items: { type: string }
        locale: { type: string }
        # Since v1.3.0 — Wave Match accepts a nested profile partial in the
        # same PATCH; allowlist below. completion is read-only and never accepted.
        profile:
          $ref: '#/components/schemas/WritableProfileFields'

    WritableProfileFields:
      type: object
      additionalProperties: false
      description: |
        Profile fields editable by partner integrations (Wave Chat).
        Sent inside `WritableUserFields.profile` on `PATCH /api/wm/users/:id`.
        Conflict resolution: last-write-wins, gated by If-Match (no special
        `mode` flag in v1). public-vs-internal split: `profile.tags` are
        public/searchable; AI-internal labels go to top-level `crmTags`.
      properties:
        role:     { type: string, maxLength: 200, nullable: true }
        industry: { type: string, maxLength: 200, nullable: true }
        location: { type: string, maxLength: 200, nullable: true }
        company:  { type: string, maxLength: 200, nullable: true }
        gender:   { $ref: '#/components/schemas/Gender' }
        tags:
          type: array
          maxItems: 50
          items: { type: string, maxLength: 50 }
        skills:
          type: array
          maxItems: 50
          items: { type: string, maxLength: 50 }
        hobbies:
          type: array
          maxItems: 30
          items: { type: string, maxLength: 50 }

    # ─── CRM Notes ──────────────────────────────────────────────────────────
    CrmNoteCreate:
      type: object
      required: [body]
      properties:
        kind:
          $ref: '#/components/schemas/CrmNoteKind'
        body:
          type: string
          minLength: 1
          maxLength: 4000
        authorEmail:
          type: string
          format: email
          maxLength: 200
        pinned: { type: boolean, default: false }
        tags:
          type: array
          items: { type: string }

    CrmNote:
      allOf:
        - $ref: '#/components/schemas/CrmNoteCreate'
        - type: object
          required: [id, createdAt]
          properties:
            id: { type: string, format: uuid }
            createdAt: { type: string, format: date-time }
            authorId: { type: string, nullable: true }

    # ─── Webhook subscription mgmt ──────────────────────────────────────────
    WebhookEventName:
      type: string
      enum:
        - user.created
        - user.updated
        - profile.updated
        - club.joined
        - club.left
        - subscription.changed

    WebhookSubscriptionCreate:
      type: object
      required: [url, events, secret]
      properties:
        url:
          type: string
          format: uri
          example: https://aiass-production.up.railway.app/webhooks/wm
        events:
          type: array
          minItems: 1
          items: { $ref: '#/components/schemas/WebhookEventName' }
        secret:
          type: string
          minLength: 32
          description: HMAC secret used to sign deliveries.

    WebhookSubscription:
      allOf:
        - $ref: '#/components/schemas/WebhookSubscriptionCreate'
        - type: object
          required: [id, createdAt]
          properties:
            id: { type: string, format: uuid }
            createdAt: { type: string, format: date-time }
            failureCount: { type: integer, default: 0 }
            lastSuccessAt: { type: string, format: date-time, nullable: true }
            secret:
              type: string
              writeOnly: true
              description: Never returned in responses; encryption-at-rest planned.

    # ─── Webhook event envelope (PUSHED to Wave Chat) ───────────────────────
    # Fields differ from canon 1.1.x: deliveryId (not eventId), createdAt (not occurredAt),
    # and `data` shapes are wrapped with the full User where applicable.
    WebhookEventBase:
      type: object
      required: [event, deliveryId, createdAt, data]
      properties:
        event: { $ref: '#/components/schemas/WebhookEventName' }
        deliveryId: { type: string, format: uuid }
        createdAt: { type: string, format: date-time }

    WebhookEvent:
      oneOf:
        - $ref: '#/components/schemas/WebhookEvent_UserCreated'
        - $ref: '#/components/schemas/WebhookEvent_UserUpdated'
        - $ref: '#/components/schemas/WebhookEvent_ProfileUpdated'
        - $ref: '#/components/schemas/WebhookEvent_ClubJoined'
        - $ref: '#/components/schemas/WebhookEvent_ClubLeft'
        - $ref: '#/components/schemas/WebhookEvent_SubscriptionChanged'
      discriminator:
        propertyName: event
        mapping:
          user.created: '#/components/schemas/WebhookEvent_UserCreated'
          user.updated: '#/components/schemas/WebhookEvent_UserUpdated'
          profile.updated: '#/components/schemas/WebhookEvent_ProfileUpdated'
          club.joined: '#/components/schemas/WebhookEvent_ClubJoined'
          club.left: '#/components/schemas/WebhookEvent_ClubLeft'
          subscription.changed: '#/components/schemas/WebhookEvent_SubscriptionChanged'

    WebhookEvent_UserCreated:
      allOf:
        - $ref: '#/components/schemas/WebhookEventBase'
        - type: object
          required: [data]
          properties:
            event: { type: string, enum: [user.created] }
            data:
              type: object
              required: [user]
              properties:
                user: { $ref: '#/components/schemas/User' }

    WebhookEvent_UserUpdated:
      allOf:
        - $ref: '#/components/schemas/WebhookEventBase'
        - type: object
          required: [data]
          properties:
            event: { type: string, enum: [user.updated] }
            data:
              type: object
              required: [user]
              properties:
                user: { $ref: '#/components/schemas/User' }
                changedFields:
                  type: array
                  items: { type: string }

    WebhookEvent_ProfileUpdated:
      allOf:
        - $ref: '#/components/schemas/WebhookEventBase'
        - type: object
          required: [data]
          properties:
            event: { type: string, enum: [profile.updated] }
            data:
              type: object
              required: [userId, profile]
              properties:
                userId: { type: string, format: uuid }
                profile: { $ref: '#/components/schemas/Profile' }
                isFirstTime:
                  type: boolean
                  description: true on first profile creation; absent on edits.

    WebhookEvent_ClubJoined:
      allOf:
        - $ref: '#/components/schemas/WebhookEventBase'
        - type: object
          required: [data]
          properties:
            event: { type: string, enum: [club.joined] }
            data:
              type: object
              required: [userId, clubSlug]
              properties:
                userId: { type: string, format: uuid }
                clubSlug: { type: string }
                clubName: { type: string }
                role: { $ref: '#/components/schemas/ClubRole' }

    # ─── Not yet emitted by Wave Match (scheduled for v1.2.x) ───────────────
    WebhookEvent_ClubLeft:
      allOf:
        - $ref: '#/components/schemas/WebhookEventBase'
        - type: object
          properties:
            event: { type: string, enum: [club.left] }
            data:
              type: object
              required: [userId, clubSlug]
              properties:
                userId: { type: string, format: uuid }
                clubSlug: { type: string }

    WebhookEvent_SubscriptionChanged:
      allOf:
        - $ref: '#/components/schemas/WebhookEventBase'
        - type: object
          properties:
            event: { type: string, enum: [subscription.changed] }
            data:
              type: object
              required: [userId, from, to, effectiveAt]
              properties:
                userId: { type: string, format: uuid }
                from: { $ref: '#/components/schemas/SubscriptionTier' }
                to: { $ref: '#/components/schemas/SubscriptionTier' }
                effectiveAt: { type: string, format: date-time }
